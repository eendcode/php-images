name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggers

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push frankenphp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile.frankenphp
          push: true
          tags: ${{ steps.meta.outputs.tags }}-frankenphp
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push wordpress
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile.wordpress
          push: true
          tags: ${{ steps.meta.outputs.tags }}-wordpress
          labels: ${{ steps.meta.outputs.labels }}                

      - name: Build and push nextcloud
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile.nextcloud
          push: true
          tags: ${{ steps.meta.outputs.tags }}-nextcloud
          labels: ${{ steps.meta.outputs.labels }}          